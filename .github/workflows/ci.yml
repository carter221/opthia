name: CI - Tests et Vérification Docker

on:
  push:
    branches: [ main, develop,ophtia-remote ]
  pull_request:
    branches: [ main, develop,ophtia-remote ]

jobs:
  lint:
    name: Linting & Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Run Gitleaks (Secrets Detection)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true # Évite de bloquer complètement si gitleaks a besoin de configuration locale
      
    - name: Run Semgrep (SAST Security Scan)
      uses: semgrep/semgrep-action@v1
      with:
        config: p/python p/javascript p/typescript p/react
      continue-on-error: true
      
    - name: Run Trivy FS (Dependencies Security Audit)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'
      continue-on-error: true
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check code formatting avec Black
      run: |
        black --check --line-length 100 backend/ frontend/ || true
    
    - name: Check imports avec isort
      run: |
        isort --check-only backend/ frontend/ || true
    
    - name: Lint avec flake8
      run: |
        flake8 backend/ frontend/ \
          --max-line-length=160 \
          --exclude=__pycache__,.git,venv,env \
          --ignore=E203,W503,E501,W291,W293,E302,E305,E261,E131,F401
    
    - name: Verify Python syntax
      run: python -m py_compile backend/app.py backend/workers/consumer.py

  build-and-push:
    name: Build & Push to GitHub Packages (GHCR)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Downcase repo name
      id: repo_vars
      run: |
        echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
        
    - name: Build and Push Backend & Worker Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ steps.repo_vars.outputs.repo_lower }}/backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ steps.repo_vars.outputs.repo_lower }}/frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Continuous Deployment (SSH to Server)
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.SSH_PROJECT_PATH }}
            # Connexion au registre GitHub Packages sur le serveur de prod
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull des nouvelles versions d'images
            docker compose pull
            # Lancement des conteneurs mis à jour sans coupure
            docker compose up -d --remove-orphans
            # Ménage
            docker image prune -f
