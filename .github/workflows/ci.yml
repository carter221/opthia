name: CI - Tests et Vérification Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Linting & Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Run Gitleaks (Secrets Detection)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true # Évite de bloquer complètement si gitleaks a besoin de configuration locale
      
    - name: Run Semgrep (SAST Security Scan)
      uses: semgrep/semgrep-action@v1
      with:
        config: p/python p/javascript p/typescript p/react
      continue-on-error: true
      
    - name: Run Trivy FS (Dependencies Security Audit)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'
      continue-on-error: true
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check code formatting avec Black
      run: |
        black --check --line-length 100 backend/ frontend/ || true
    
    - name: Check imports avec isort
      run: |
        isort --check-only backend/ frontend/ || true
    
    - name: Lint avec flake8
      run: |
        flake8 backend/ frontend/ \
          --max-line-length=100 \
          --exclude=__pycache__,.git,venv,env \
          --ignore=E203,W503
    
    - name: Verify Python syntax
      run: python -m py_compile backend/app.py backend/workers/consumer.py frontend/app.py

  docker-build:
    name: Build & Verify Docker Images
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Clean up Docker cache (free space)
      run: |
        echo "🧹 Freeing up disk space..."
        docker system prune -af --volumes || true
        docker builder prune -af || true
        df -h
    
    - name: Build Backend image
      run: |
        echo " Building Backend image..."
        docker build -t ophtia-backend:test ./backend
    
    - name: Build Frontend image
      run: |
        echo " Building Frontend image..."
        docker build -t ophtia-frontend:test ./frontend
    
    - name: Build Worker image
      run: |
        echo " Building Worker image..."
        docker build -t ophtia-worker-1:test ./backend
    
    - name: Build Airflow image
      run: |
        echo " Building Airflow image..."
        docker build -t ophtia-airflow:test ./airflow
    
    - name: Verify images exist
      run: |
        echo " Images built successfully"
        docker images | grep ophtia
    
    - name: Cleanup docker-build job
      run: |
        echo "🧹 Cleanup after build..."
        docker system prune -af --volumes || true
        docker builder prune -af || true
        df -h

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, docker-build]
    if: always()
    
    steps:
    - name: Check job status
      run: |
        echo "✅ CI Pipeline Summary"
        echo "- Linting: ${{ needs.lint.result }}"
        echo "- Docker Build: ${{ needs.docker-build.result }}"
        
        if [ "${{ needs.lint.result }}" = "failure" ] || [ "${{ needs.docker-build.result }}" = "failure" ]; then
          exit 1
        fi
